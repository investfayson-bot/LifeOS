services:
  - type: web
    name: LifeOS-1
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install --include=dev && PRISMA_HIDE_UPDATE_MESSAGE=1 npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
